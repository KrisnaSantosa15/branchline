name: Branchline release policy

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - uses: KrisnaSantosa15/branchline/.github/actions/branchline@master
        with:
          policy: .branchline/policy.yml
          fail-on: fail
